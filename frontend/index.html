<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tinkuy Marka — Guía Mapache</title>
  <link rel="icon" type="image/webp" href="favicon.webp" />
  <style>
    :root {
      --bg: #fdf6ee;
      --surface: #fff9f3;
      --border: #e8d9c5;
      --accent: #b5623a;
      --accent-light: #f5e6d8;
      --text: #2d2017;
      --text-muted: #8a6e56;
      --radius: 18px;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 720px;
      padding: 20px 24px 14px;
      text-align: center;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; color: var(--accent); }
    header p  { font-size: 0.82rem; color: var(--text-muted); margin-top: 4px; }

    /* ── No-config warning ── */
    #no-config {
      display: none;
      width: calc(100% - 32px);
      max-width: 688px;
      margin-bottom: 8px;
      padding: 10px 14px;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 10px;
      font-size: 0.8rem;
      color: #664d03;
    }

    /* ── Tab navigation ── */
    #tab-nav {
      width: 100%;
      max-width: 720px;
      display: flex;
      border-bottom: 1.5px solid var(--border);
      padding: 0 16px;
    }
    .tab-btn {
      padding: 10px 18px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-muted);
      border-bottom: 2.5px solid transparent;
      margin-bottom: -1.5px;
      transition: color 0.15s, border-color 0.15s;
      font-family: inherit;
    }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-btn:hover:not(.active) { color: var(--text); }

    /* ── Chat section ── */
    #chat-section {
      flex: 1;
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Chat window ── */
    #chat {
      flex: 1;
      width: 100%;
      overflow-y: auto;
      padding: 8px 16px 4px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .msg { display: flex; gap: 10px; animation: fadeUp 0.2s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg.user { flex-direction: row-reverse; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0; align-self: flex-end;
      overflow: hidden;
    }
    .msg.user .avatar { background: var(--accent); }
    .msg.bot  .avatar { background: var(--accent-light); }
    .avatar img {
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 50%;
    }

    .bubble {
      max-width: 78%;
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 0.92rem;
      line-height: 1.6;
      box-shadow: var(--shadow);
    }
    .bubble p  { margin-bottom: 0.5em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul { margin: 0.3em 0 0.5em 1.2em; }
    .bubble li { margin-bottom: 0.4em; }
    .bubble em { font-style: italic; color: var(--text-muted); font-size: 0.85em; }
    .msg.user .bubble {
      background: var(--accent);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .typing-dots span {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%,80%,100% { transform: translateY(0); }
      40%          { transform: translateY(-6px); }
    }

    /* ── Input ── */
    #input-area { width: 100%; padding: 12px 16px 20px; }
    #input-area form {
      display: flex; gap: 10px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 24px;
      padding: 8px 8px 8px 18px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }
    #input-area form:focus-within { border-color: var(--accent); }

    textarea {
      flex: 1; border: none; outline: none; background: transparent;
      resize: none; font-size: 0.93rem; color: var(--text);
      font-family: inherit; line-height: 1.5;
      max-height: 120px; overflow-y: auto;
    }
    textarea::placeholder { color: var(--text-muted); }

    button#send {
      background: var(--accent); color: white;
      border: none; border-radius: 18px;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; align-self: flex-end;
      transition: background 0.15s, transform 0.1s;
    }
    button#send:hover   { background: #963f22; }
    button#send:active  { transform: scale(0.94); }
    button#send:disabled { background: var(--border); cursor: not-allowed; }
    button#send svg { width: 18px; height: 18px; }

    /* ── Ranking section ── */
    #ranking-section {
      flex: 1;
      width: 100%;
      max-width: 720px;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }

    #ranking-subtabs {
      display: flex;
      gap: 8px;
      padding: 14px 16px 6px;
      flex-shrink: 0;
    }
    .subtab-btn {
      padding: 6px 16px;
      border: 1.5px solid var(--border);
      background: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.83rem;
      font-weight: 600;
      color: var(--text-muted);
      font-family: inherit;
      transition: all 0.15s;
    }
    .subtab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }
    .subtab-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    #ranking-casa-filters {
      display: flex;
      gap: 6px;
      padding: 4px 16px 10px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .casa-btn {
      padding: 4px 12px;
      border: 1.5px solid var(--border);
      background: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--text-muted);
      font-family: inherit;
      transition: all 0.15s;
    }
    .casa-btn:hover:not(.active) { opacity: 0.75; }
    .casa-btn.active { color: white; border-color: transparent; }

    #ranking-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 16px 24px;
    }

    .rank-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      margin-bottom: 7px;
      background: white;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      animation: fadeUp 0.2s ease;
    }

    .rank-pos {
      font-size: 1rem;
      font-weight: 700;
      min-width: 28px;
      text-align: center;
      color: var(--text-muted);
      flex-shrink: 0;
    }
    .rank-pos.top3 { font-size: 1.2rem; }

    .rank-avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem;
      background: var(--accent-light);
      flex-shrink: 0;
    }
    .rank-avatar img {
      width: 100%; height: 100%;
      object-fit: cover; border-radius: 50%;
    }

    .rank-info {
      flex: 1;
      min-width: 0;
    }
    .rank-name {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .rank-bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
    }
    .rank-bar-track {
      flex: 1;
      height: 5px;
      background: var(--accent-light);
      border-radius: 3px;
      overflow: hidden;
    }
    .rank-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width 0.5s ease;
    }
    .rank-count {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--text-muted);
      min-width: 22px;
      text-align: right;
    }

    .rank-casa {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 12px;
      color: white;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .ranking-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .ranking-meta {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-align: right;
      padding: 0 4px 10px;
    }
  </style>
</head>
<body>

<header>
  <h1>🐾 Tinkuy Marka — Guía Mapache</h1>
  <p>Tu acompañante en el Viaje del Héroe</p>
</header>

<div id="no-config">
  ⚠️ API no configurado. Ejecuta <code>make deploy</code> y luego <code>make update-frontend-config</code>.
</div>

<nav id="tab-nav">
  <button class="tab-btn active" data-tab="chat" onclick="switchTab('chat')">💬 Chat</button>
  <button class="tab-btn" data-tab="ranking" onclick="switchTab('ranking')">🏅 Ranking</button>
</nav>

<!-- Chat -->
<div id="chat-section">
  <div id="chat">
    <div class="msg bot">
      <div class="avatar">🦝</div>
      <div class="bubble">¡Hola! Soy tu guía en el Viaje del Héroe de Tinkuy Marka. 🐾

Para acompañarte mejor en tu camino, ¿me puedes decir tu nombre?</div>
    </div>
  </div>

  <div id="input-area">
    <form onsubmit="sendMessage(event)">
      <textarea
        id="msg-input"
        rows="1"
        placeholder="Escribe tu mensaje…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send" type="submit">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </form>
  </div>
</div>

<!-- Ranking -->
<div id="ranking-section">
  <div id="ranking-subtabs">
    <button class="subtab-btn active" data-subtab="all_time" onclick="switchSubTab('all_time')">Todos los tiempos</button>
    <button class="subtab-btn" data-subtab="last_3_months" onclick="switchSubTab('last_3_months')">Últimos 3 meses</button>
  </div>
  <div id="ranking-casa-filters">
    <button class="casa-btn active" data-casa="" onclick="switchCasaFilter('')" style="background:var(--accent);border-color:var(--accent)">Todas</button>
    <button class="casa-btn" data-casa="Chavin" onclick="switchCasaFilter('Chavin')">Chavin</button>
    <button class="casa-btn" data-casa="Wari"   onclick="switchCasaFilter('Wari')">Wari</button>
    <button class="casa-btn" data-casa="Moche"  onclick="switchCasaFilter('Moche')">Moche</button>
    <button class="casa-btn" data-casa="Nazca"  onclick="switchCasaFilter('Nazca')">Nazca</button>
  </div>
  <div id="ranking-list">
    <div class="ranking-empty">Cargando ranking…</div>
  </div>
</div>

<script src="config.js"></script>
<script>
  let sessionId    = 'session-' + Math.random().toString(36).slice(2, 10);
  let isLoading    = false;
  let userAvatarUrl = null;

  // Show warning if API not configured
  if (!API_URL) document.getElementById('no-config').style.display = 'block';

  /* ───────────────────────────────── TABS ───────────────────────────────── */

  let rankingData      = null;
  let rankingLoaded    = false;
  let activeSubTab     = 'all_time';
  let activeCasaFilter = '';

  const CASA_COLORS = {
    Chavin: '#4a90d9',
    Wari:   '#27ae60',
    Moche:  '#e67e22',
    Nazca:  '#b5623a',
  };

  function switchTab(name) {
    const isChat = name === 'chat';
    document.getElementById('chat-section').style.display    = isChat ? 'flex' : 'none';
    document.getElementById('ranking-section').style.display = isChat ? 'none' : 'flex';
    document.querySelectorAll('.tab-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.tab === name)
    );
    if (name === 'ranking' && !rankingLoaded) loadRanking();
  }

  async function loadRanking() {
    rankingLoaded = true;
    try {
      const res = await fetch('ranking.json');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      rankingData = await res.json();
      renderRankingTab();
    } catch (e) {
      document.getElementById('ranking-list').innerHTML =
        '<div class="ranking-empty">No se pudieron cargar los datos.</div>';
    }
  }

  function switchSubTab(key) {
    activeSubTab = key;
    document.querySelectorAll('.subtab-btn').forEach(btn =>
      btn.classList.toggle('active', btn.dataset.subtab === key)
    );
    if (rankingData) renderRankingTab();
  }

  function switchCasaFilter(casa) {
    activeCasaFilter = casa;
    document.querySelectorAll('.casa-btn').forEach(btn => {
      const isActive = btn.dataset.casa === casa;
      btn.classList.toggle('active', isActive);
      const color = CASA_COLORS[btn.dataset.casa] || 'var(--accent)';
      btn.style.background    = isActive ? color : '';
      btn.style.borderColor   = isActive ? color : '';
    });
    if (rankingData) renderRankingTab();
  }

  function renderRankingTab() {
    const list = document.getElementById('ranking-list');
    let rows = rankingData?.[activeSubTab] ?? [];

    if (activeCasaFilter) {
      rows = rows.filter(r => r.casa === activeCasaFilter);
    }

    if (rows.length === 0) {
      list.innerHTML = '<div class="ranking-empty">Sin badges en este período.</div>';
      return;
    }

    const total    = rankingData?.[activeSubTab]?.length ?? rows.length;
    const casaLabel = activeCasaFilter ? ` · Casa ${activeCasaFilter}` : '';
    const meta = activeSubTab === 'all_time'
      ? `${rows.length} mapaches${casaLabel} · ${rankingData.total_unique_badges} badges posibles`
      : `${rows.length} mapaches activos en los últimos 3 meses${casaLabel}`;

    const rowsHtml = rows.map((r, i) => {
      const pos    = i + 1;
      const medal  = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : pos;
      const isTop3 = pos <= 3;
      const avatarHtml = r.avatar
        ? `<img src="${r.avatar.replace(/"/g,'%22')}" alt="${escHtml(r.name)}" onerror="this.outerHTML='🦝'">`
        : '🦝';
      const casaColor = CASA_COLORS[r.casa] || '#8a6e56';
      const casaHtml  = (!activeCasaFilter && r.casa)
        ? `<div class="rank-casa" style="background:${casaColor}">${escHtml(r.casa)}</div>`
        : '';
      return `
        <div class="rank-row">
          <div class="rank-pos${isTop3 ? ' top3' : ''}">${medal}</div>
          <div class="rank-avatar">${avatarHtml}</div>
          <div class="rank-info">
            <div class="rank-name">${escHtml(r.name)}</div>
            <div class="rank-bar-row">
              <div class="rank-bar-track">
                <div class="rank-bar-fill" style="width:${r.pct}%"></div>
              </div>
              <div class="rank-count">${r.count}</div>
            </div>
          </div>
          ${casaHtml}
        </div>`;
    }).join('');

    list.innerHTML = `<div class="ranking-meta">${escHtml(meta)}</div>${rowsHtml}`;
  }

  /* ───────────────────────────────── CHAT ───────────────────────────────── */

  async function sendMessage(e) {
    e.preventDefault();
    const input = document.getElementById('msg-input');
    const text  = input.value.trim();
    if (!text || isLoading) return;

    if (!API_URL) {
      appendMessage('bot', '⚠️ El API aún no está configurado. Ejecuta make deploy primero.');
      return;
    }

    input.value = '';
    autoResize(input);
    appendMessage('user', text);
    showTyping();
    setLoading(true);

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      removeTyping();
      if (data.avatar_url && !userAvatarUrl) {
        userAvatarUrl = data.avatar_url;
        _refreshInitialUserAvatars();
      }
      appendMessage('bot', data.response || '(Sin respuesta)');
    } catch (err) {
      removeTyping();
      appendMessage('bot', `⚠️ Error al conectar.\n${err.message}`);
    } finally {
      setLoading(false);
    }
  }

  function _avatarHtml(role) {
    if (role === 'bot') return '🦝';
    if (userAvatarUrl) {
      const safe = userAvatarUrl.replace(/"/g, '%22');
      return `<img src="${safe}" alt="avatar" onerror="this.outerHTML='👤'">`;
    }
    return '👤';
  }

  function _refreshInitialUserAvatars() {
    document.querySelectorAll('.msg.user .avatar').forEach(el => {
      if (el.textContent === '👤') el.innerHTML = _avatarHtml('user');
    });
  }

  function appendMessage(role, text) {
    const chat    = document.getElementById('chat');
    const div     = document.createElement('div');
    div.className = `msg ${role}`;
    const content = role === 'bot' ? renderMarkdown(text) : escHtml(text);
    div.innerHTML = `
      <div class="avatar">${_avatarHtml(role)}</div>
      <div class="bubble">${content}</div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTyping() {
    const chat = document.getElementById('chat');
    const div  = document.createElement('div');
    div.id = 'typing'; div.className = 'msg bot';
    div.innerHTML = `<div class="avatar" style="background:var(--accent-light)">🦝</div>
      <div class="bubble typing-dots"><span></span><span></span><span></span></div>`;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
  }

  function removeTyping()  { document.getElementById('typing')?.remove(); }
  function setLoading(v)   {
    isLoading = v;
    document.getElementById('send').disabled = v;
  }
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      document.querySelector('form').requestSubmit();
    }
  }
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }
  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMarkdown(raw) {
    const esc   = escHtml(raw);
    const lines = esc.split('\n');
    const out   = [];
    let inList  = false;

    for (let line of lines) {
      if (/^- /.test(line)) {
        if (!inList) { out.push('<ul>'); inList = true; }
        out.push(`<li>${applyInline(line.replace(/^- /, ''))}</li>`);
      } else {
        if (inList) { out.push('</ul>'); inList = false; }
        if (line.trim()) out.push(`<p>${applyInline(line)}</p>`);
      }
    }
    if (inList) out.push('</ul>');
    return out.join('');
  }

  function applyInline(s) {
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*\((.+?)\)\*/g, '<em>($1)</em>');
    return s;
  }
</script>
</body>
</html>
